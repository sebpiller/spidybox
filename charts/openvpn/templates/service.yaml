---
apiVersion: v1
kind: Service
metadata:
  namespace: "{{ .Release.Namespace }}"
  name: openvpn
spec:
  type: NodePort
  ports:
    - port: 443
      targetPort: 443
      nodePort: 30043
    - port: 943
      targetPort: 943
      nodePort: 30943
    - port: 1194
      targetPort: 1194
      nodePort: 30194
      protocol: UDP
  selector:
    app: openvpn